<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>htmlstudio demo</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f3f4f6; color: #111; display: grid; grid-template-columns: 1fr 360px; height: 100vh; }
    iframe { width: 100%; height: 100%; border: 0; background: #e5e7eb; }
    aside { background: #fff; border-left: 1px solid #e5e7eb; padding: 20px; overflow: auto; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px; color: #6b7280; }
    .row { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font: inherit; }
    button { padding: 8px 14px; border: 0; border-radius: 6px; background: #111; color: #fff; cursor: pointer; font: inherit; }
    button:disabled { background: #d1d5db; cursor: default; }
    .meta { font-size: 12px; color: #6b7280; margin-bottom: 16px; padding: 8px; background: #f9fafb; border-radius: 6px; }
    .empty { color: #9ca3af; font-style: italic; }
    .log { margin-top: 20px; font-family: ui-monospace, monospace; font-size: 11px; color: #6b7280; max-height: 200px; overflow: auto; background: #f9fafb; padding: 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <iframe id="preview" src="/preview"></iframe>
  <aside>
    <h2>Inspector</h2>
    <div id="meta" class="empty">Click an element in the preview.</div>
    <div id="form"></div>
    <h2 style="margin-top: 24px;">Event log</h2>
    <div id="log" class="log"></div>
  </aside>

  <script>
    const preview = document.getElementById('preview');
    const meta = document.getElementById('meta');
    const form = document.getElementById('form');
    const log = document.getElementById('log');
    let selected = null;

    function logLine(s) {
      const div = document.createElement('div');
      div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + s;
      log.prepend(div);
    }

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg || msg.channel !== 've') return;
      if (msg.type === 'ready') logLine('bridge ready — ' + msg.payload.count + ' elements tagged');
      if (msg.type === 'select') {
        selected = msg.payload;
        renderInspector();
        logLine('select ' + (msg.payload && msg.payload.id));
      }
      if (msg.type === 'dblclick-text') {
        logLine('inline-edit ' + msg.payload.id + ' → "' + msg.payload.value + '"');
        sendPatch({ kind: 'set-text', id: msg.payload.id, value: msg.payload.value });
      }
    });

    function renderInspector() {
      if (!selected) { meta.textContent = 'Click an element in the preview.'; meta.className = 'empty'; form.innerHTML = ''; return; }
      meta.className = 'meta';
      meta.innerHTML = '<b>' + selected.tag + '</b> · id=' + selected.id + ' · kind=' + selected.kind;
      form.innerHTML = '';
      if (selected.kind === 'text') {
        addRow('Text', 'textarea', selected.text || '', (v) => sendPatch({ kind: 'set-text', id: selected.id, value: v }));
      } else if (selected.kind === 'link') {
        addRow('Href', 'input', selected.attributes.href || '', (v) => sendPatch({ kind: 'set-link', id: selected.id, href: v, text: selected.text || '' }));
        addRow('Label', 'input', selected.text || '', (v) => sendPatch({ kind: 'set-link', id: selected.id, href: selected.attributes.href || '', text: v }));
      } else if (selected.kind === 'image') {
        addRow('Src', 'input', selected.attributes.src || '', (v) => sendPatch({ kind: 'set-image', id: selected.id, src: v, alt: selected.attributes.alt || '' }));
        addRow('Alt', 'input', selected.attributes.alt || '', (v) => sendPatch({ kind: 'set-image', id: selected.id, src: selected.attributes.src || '', alt: v }));
      }
      addRow('style (key: value; ...)', 'textarea', selected.attributes.style || '', (v) => {
        const styles = {};
        v.split(';').forEach((d) => { const [k, ...r] = d.split(':'); if (k && r.length) styles[k.trim()] = r.join(':').trim(); });
        sendPatch({ kind: 'set-style', id: selected.id, styles });
      });
    }

    function addRow(label, type, value, onSave) {
      const wrap = document.createElement('div'); wrap.className = 'row';
      const lab = document.createElement('label'); lab.textContent = label;
      const input = document.createElement(type); input.value = value;
      if (type === 'textarea') input.rows = 3;
      const btn = document.createElement('button'); btn.textContent = 'Apply'; btn.style.marginTop = '6px';
      btn.onclick = () => onSave(input.value);
      wrap.append(lab, input, btn); form.append(wrap);
    }

    async function sendPatch(patch) {
      const res = await fetch('/patch', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(patch) });
      const r = await res.json();
      if (!r.ok) { logLine('PATCH FAILED: ' + r.error); return; }
      logLine('patched ' + patch.kind + ' → reloading preview');
      preview.src = '/preview?' + Date.now();
    }
  </script>
</body>
</html>
