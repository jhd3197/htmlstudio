name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # `npm install` rather than `npm ci`: the committed lockfile is
      # generated on Windows and only lists Windows-platform rollup binaries
      # as optional deps. `npm ci` strictly follows the lockfile and won't
      # fetch the Linux binary the runner actually needs. See
      # https://github.com/npm/cli/issues/4828.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test
