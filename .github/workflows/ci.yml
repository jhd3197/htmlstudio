name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # The committed lockfile is generated on Windows and pins win32-only
      # rollup optional deps. Even `npm install` respects those entries, so
      # we delete the lockfile to force a fresh resolve on the Linux runner
      # — exactly what the npm bug's own error message recommends. See
      # https://github.com/npm/cli/issues/4828.
      - run: rm -f package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test
