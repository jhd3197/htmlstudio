name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install (root)
        # `npm install`, not `npm ci` — Windows-generated lockfile omits
        # the Linux rollup binary. See https://github.com/npm/cli/issues/4828.
        run: npm install --no-audit --no-fund

      - name: Build htmlstudio
        run: npm run build

      - name: Install (demo)
        run: npm --prefix demo install --no-audit --no-fund

      - name: Build demo
        env:
          BASE_PATH: /htmlstudio/
        run: npm --prefix demo run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
